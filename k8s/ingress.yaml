apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dnd-project-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: "letsencrypt-prod" # If using SSL
spec:
  # tls:
  # - hosts:
  #   - dnd.example.com
  #   secretName: dnd-project-tls
  rules:
  - host: dnd.example.com # Replace with your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: dnd-api-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dnd-project-service
            port:
              number: 80
