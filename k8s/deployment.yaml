apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnd-project
  labels:
    app: dnd-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dnd-project
  template:
    metadata:
      labels:
        app: dnd-project
    spec:
      containers:
      - name: dnd-project
        image: <REPLACE_WITH_YOUR_DOCKER_IMAGE> # e.g. registry.example.com/dnd-project:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        env:
        - name: NODE_ENV
          value: "production"
        # Add other environment variables as needed
